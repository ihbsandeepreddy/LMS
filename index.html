<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LoanOps Cloud - a no-build loans management platform prototype for origination, underwriting, servicing, collections, and audit-ready analytics."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Anton', 'sans-serif'],
            },
            boxShadow: {
              soft: '0 24px 80px rgba(8, 15, 32, 0.18)',
            },
          },
        },
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        font-family: 'Inter', sans-serif;
        background: #0f172a;
      }

      .grain {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 200px 200px;
      }

      .panel {
        transition:
          transform 650ms cubic-bezier(0.4, 0, 0.2, 1),
          filter 650ms cubic-bezier(0.4, 0, 0.2, 1),
          opacity 650ms cubic-bezier(0.4, 0, 0.2, 1),
          left 650ms cubic-bezier(0.4, 0, 0.2, 1),
          height 650ms cubic-bezier(0.4, 0, 0.2, 1),
          bottom 650ms cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform, filter, opacity;
      }

      .icon-button {
        transition: transform 150ms, background-color 150ms;
      }

      .icon-button:hover {
        transform: scale(1.08);
        background: rgba(255, 255, 255, 0.12);
      }

      @media (max-width: 639px) {
        .hide-mobile {
          display: none;
        }
      }
    </style>
    <title>LoanOps Cloud</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useMemo, useState, useEffect } from 'https://esm.sh/react@18.3.1';
      import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1';
      import {
        ArrowLeft,
        ArrowRight,
        BadgeCheck,
        Banknote,
        Bell,
        Building2,
        Calculator,
        CheckCircle2,
        CircleDollarSign,
        ClipboardCheck,
        FileCheck2,
        FileText,
        Gauge,
        Layers3,
        LockKeyhole,
        PlayCircle,
        Search,
        Settings2,
        ShieldCheck,
        SlidersHorizontal,
        Sparkles,
        TrendingUp,
        UploadCloud,
        UserCog,
        UserPlus,
        UsersRound,
        WalletCards,
      } from 'https://esm.sh/lucide-react@0.468.0?deps=react@18.3.1';

      const h = React.createElement;

      const WORKSTREAMS = [
        {
          label: 'Origination',
          title: 'Loan intake, KYC, and eligibility',
          detail:
            'Digitize applications, validate borrower records, score eligibility, and route exceptions before the credit desk opens the file.',
          bg: '#3F8C7A',
          accent: '#F6C85F',
          icon: Banknote,
          amount: 'Rs.84.2 Cr',
          metric: 'sanction-ready pipeline',
          queue: ['412 applications', '97% KYC match', '23 policy exceptions'],
          chart: [44, 58, 52, 70, 78, 74, 88],
        },
        {
          label: 'Underwriting',
          title: 'Credit memo and approval cockpit',
          detail:
            'Combine bureau data, bank statements, GST trails, collateral values, and approval matrices into one auditable decision surface.',
          bg: '#6D6A9F',
          accent: '#91E0D6',
          icon: ClipboardCheck,
          amount: '18 min',
          metric: 'median decision cycle',
          queue: ['64 credit memos', '11 committee items', '8 collateral reviews'],
          chart: [38, 50, 57, 61, 67, 81, 76],
        },
        {
          label: 'Servicing',
          title: 'Repayments, schedules, and mandates',
          detail:
            'Track EMI schedules, receipts, escrow movements, prepayments, waivers, and borrower communications from one control room.',
          bg: '#3D77A8',
          accent: '#FFC7A0',
          icon: WalletCards,
          amount: '99.1%',
          metric: 'mandate health',
          queue: ['7,812 active loans', '231 prepay requests', '42 failed debits'],
          chart: [72, 74, 71, 80, 86, 88, 91],
        },
        {
          label: 'Risk',
          title: 'Collections, stress, and audit trail',
          detail:
            'Surface SMA buckets, overdue exposure, cure actions, provisioning triggers, and every maker-checker action for audit defence.',
          bg: '#A15B68',
          accent: '#BFF0A8',
          icon: ShieldCheck,
          amount: '2.8%',
          metric: 'portfolio at risk',
          queue: ['146 SMA-1 loans', '38 legal notices', 'Rs.5.7 Cr cured'],
          chart: [31, 36, 42, 39, 47, 51, 46],
        },
      ];

      function App() {
        const [activeIndex, setActiveIndex] = useState(0);
        const [isAnimating, setIsAnimating] = useState(false);
        const [isMobile, setIsMobile] = useState(false);
        const [applications, setApplications] = useState([
          { borrower: 'Aarav Textiles', product: 'Working capital', amount: 2400000, status: 'Underwriting', score: 742 },
          { borrower: 'Nexa Mobility', product: 'Vehicle loan', amount: 875000, status: 'Approved', score: 718 },
          { borrower: 'Prime Agro', product: 'Equipment finance', amount: 1625000, status: 'KYC Review', score: 681 },
        ]);
        const [borrower, setBorrower] = useState('IHB Manufacturing');
        const [product, setProduct] = useState('Term loan');
        const [loanAmount, setLoanAmount] = useState(1250000);
        const [rate, setRate] = useState(12.5);
        const [months, setMonths] = useState(36);
        const [selectedAnalytics, setSelectedAnalytics] = useState(['Eligibility', 'EMI', 'IRACP']);
        const active = WORKSTREAMS[activeIndex];

        const monthlyRate = rate / 12 / 100;
        const emi =
          monthlyRate === 0
            ? loanAmount / months
            : (loanAmount * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);

        const addApplication = () => {
          setApplications((current) => [
            {
              borrower: borrower || 'New Borrower',
              product: product || 'Loan product',
              amount: Number(loanAmount) || 0,
              status: 'New Application',
              score: 700 + (current.length % 4) * 11,
            },
            ...current,
          ]);
        };

        const toggleAnalytics = (name) => {
          setSelectedAnalytics((current) =>
            current.includes(name) ? current.filter((item) => item !== name) : [...current, name],
          );
        };

        const generateWorkpaper = () => {
          const lines = [
            'LoanOps Cloud - Loan Workpaper',
            `Borrower: ${borrower}`,
            `Product: ${product}`,
            `Loan Amount: Rs.${Number(loanAmount).toLocaleString('en-IN')}`,
            `Rate: ${rate}%`,
            `Tenure: ${months} months`,
            `Estimated EMI: Rs.${Math.round(emi).toLocaleString('en-IN')}`,
            `Analytics: ${selectedAnalytics.join(', ')}`,
          ];
          const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = 'loanops-workpaper.txt';
          link.click();
          URL.revokeObjectURL(url);
        };

        useEffect(() => {
          const updateMobile = () => setIsMobile(window.innerWidth < 640);
          updateMobile();
          window.addEventListener('resize', updateMobile);
          return () => window.removeEventListener('resize', updateMobile);
        }, []);

        const roles = useMemo(
          () => ({
            center: activeIndex,
            left: (activeIndex + 3) % WORKSTREAMS.length,
            right: (activeIndex + 1) % WORKSTREAMS.length,
            back: (activeIndex + 2) % WORKSTREAMS.length,
          }),
          [activeIndex],
        );

        const navigate = (direction) => {
          if (isAnimating) return;
          setIsAnimating(true);
          setActiveIndex((previous) =>
            direction === 'next'
              ? (previous + 1) % WORKSTREAMS.length
              : (previous + WORKSTREAMS.length - 1) % WORKSTREAMS.length,
          );
          window.setTimeout(() => setIsAnimating(false), 650);
        };

        return h(
          'main',
          {
            className: 'relative w-full overflow-hidden text-white',
            style: {
              minHeight: '100vh',
              backgroundColor: active.bg,
              transition: 'background-color 650ms cubic-bezier(0.4,0,0.2,1)',
              fontFamily: 'Inter, sans-serif',
            },
          },
          h(
            'div',
            { className: 'relative w-full overflow-hidden', style: { height: '100vh' } },
            h('div', { className: 'grain pointer-events-none absolute inset-0 opacity-40', style: { zIndex: 50 } }),
            h(
              'div',
              {
                className: 'pointer-events-none absolute inset-x-0 flex select-none items-center justify-center',
                style: { zIndex: 2, top: isMobile ? '20%' : '14%' },
              },
              h(
                'span',
                {
                  className: 'font-display uppercase',
                  style: {
                    fontSize: 'clamp(72px, 22vw, 300px)',
                    fontWeight: 900,
                    color: 'white',
                    opacity: 0.16,
                    lineHeight: 1,
                    letterSpacing: '0',
                    whiteSpace: 'nowrap',
                  },
                },
                'LOAN OPS',
              ),
            ),
            h(Header),
            h(
              'section',
              { className: 'absolute inset-0', style: { zIndex: 3 }, 'aria-label': 'Loans management workflow carousel' },
              WORKSTREAMS.map((stream, index) => {
                const role =
                  index === roles.center ? 'center' : index === roles.left ? 'left' : index === roles.right ? 'right' : 'back';
                return h(DashboardPanel, {
                  key: stream.label,
                  stream,
                  role,
                  isMobile,
                  isActive: index === roles.center,
                });
              }),
            ),
            h(
              'section',
              {
                className: 'absolute bottom-5 left-4 max-w-[300px] sm:bottom-16 sm:left-12 lg:left-20',
                style: { zIndex: 60 },
              },
              h('p', { className: 'mb-2 text-base font-bold uppercase tracking-widest text-white opacity-95 sm:mb-3 sm:text-[22px]' }, `${active.label} control tower`),
              h('p', { className: 'mb-4 hidden text-sm leading-6 text-white/85 sm:block' }, active.detail),
              h(
                'div',
                { className: 'mb-5 grid grid-cols-2 gap-2 sm:grid-cols-3' },
                active.queue.map((item) =>
                  h(
                    'div',
                    {
                      key: item,
                      className: 'border border-white/20 bg-white/10 px-3 py-2 text-[11px] font-semibold text-white/90 backdrop-blur-md',
                    },
                    item,
                  ),
                ),
              ),
              h(
                'div',
                { className: 'flex items-center gap-3' },
                h(NavButton, { label: 'Previous workstream', onClick: () => navigate('prev'), icon: ArrowLeft }),
                h(NavButton, { label: 'Next workstream', onClick: () => navigate('next'), icon: ArrowRight }),
              ),
            ),
            h(
              'a',
              {
                href: '#workflow',
                className:
                  'absolute bottom-5 right-4 flex items-center gap-2 font-display uppercase text-white no-underline transition-opacity duration-200 hover:opacity-100 sm:bottom-16 sm:right-10',
                style: {
                  zIndex: 60,
                  fontSize: 'clamp(20px, 4vw, 56px)',
                  fontWeight: 400,
                  opacity: 0.95,
                  letterSpacing: '0',
                  lineHeight: 1,
                },
              },
              'Run loan book',
              h(ArrowRight, { className: 'h-5 w-5 sm:h-8 sm:w-8', strokeWidth: 2.25 }),
            ),
          ),
          h(WorkflowBand, { active }),
          h(OperationsConsole, {
            applications,
            borrower,
            setBorrower,
            product,
            setProduct,
            loanAmount,
            setLoanAmount,
            rate,
            setRate,
            months,
            setMonths,
            emi,
            addApplication,
            selectedAnalytics,
            toggleAnalytics,
            generateWorkpaper,
            active,
          }),
        );
      }

      function Header() {
        return h(
          'header',
          {
            className: 'absolute left-4 right-4 top-5 flex items-center justify-between sm:left-8 sm:right-8',
            style: { zIndex: 60 },
          },
          h('div', { className: 'text-xs font-semibold uppercase text-white/90', style: { letterSpacing: '0.18em' } }, 'LOANOPS CLOUD'),
          h(
            'nav',
            { className: 'hidden items-center gap-2 rounded-full border border-white/20 bg-white/10 px-2 py-2 text-xs font-semibold text-white/90 backdrop-blur-md sm:flex' },
            h('span', { className: 'px-3' }, 'Portfolio'),
            h('span', { className: 'px-3' }, 'Underwriting'),
            h('span', { className: 'px-3' }, 'Risk'),
            h(
              'button',
              { className: 'flex items-center gap-2 rounded-full bg-white px-4 py-2 text-slate-900 transition-transform hover:scale-[1.03]' },
              h(LockKeyhole, { className: 'h-4 w-4' }),
              'Secure login',
            ),
          ),
          h(
            'button',
            { className: 'flex h-10 w-10 items-center justify-center border border-white/25 bg-white/10 text-white backdrop-blur-md sm:hidden', 'aria-label': 'Open filters' },
            h(SlidersHorizontal, { className: 'h-5 w-5' }),
          ),
        );
      }

      function DashboardPanel({ stream, role, isMobile, isActive }) {
        const styles = getPanelStyle(role, isMobile);
        const Icon = stream.icon;

        return h(
          'article',
          {
            className: 'panel absolute overflow-hidden border border-white/20 text-slate-950 shadow-soft backdrop-blur-xl',
            style: {
              ...styles,
              backgroundColor: role === 'center' ? 'rgba(255,255,255,0.92)' : 'rgba(255,255,255,0.58)',
            },
            'aria-hidden': !isActive,
          },
          h(
            'div',
            { className: 'flex h-full flex-col' },
            h(
              'div',
              { className: 'flex items-center justify-between border-b border-slate-950/10 px-5 py-4' },
              h(
                'div',
                { className: 'flex items-center gap-3' },
                h(
                  'span',
                  { className: 'flex h-11 w-11 items-center justify-center rounded-full text-slate-950', style: { backgroundColor: stream.accent } },
                  h(Icon, { className: 'h-5 w-5', strokeWidth: 2.4 }),
                ),
                h(
                  'div',
                  null,
                  h('p', { className: 'text-xs font-bold uppercase text-slate-500', style: { letterSpacing: '0.14em' } }, stream.label),
                  h('h2', { className: 'text-xl font-bold leading-tight sm:text-2xl' }, stream.title),
                ),
              ),
              h(Bell, { className: 'h-5 w-5 text-slate-500' }),
            ),
            h(
              'div',
              { className: 'grid flex-1 grid-cols-1 gap-4 p-5 sm:grid-cols-[1.2fr_0.8fr]' },
              h(
                'div',
                { className: 'flex min-h-0 flex-col gap-4' },
                h(
                  'div',
                  { className: 'grid grid-cols-2 gap-3' },
                  h(MetricCard, { label: stream.metric, value: stream.amount, icon: TrendingUp }),
                  h(MetricCard, { label: 'audit checks passed', value: '96.4%', icon: BadgeCheck }),
                ),
                h(
                  'div',
                  { className: 'flex flex-1 flex-col border border-slate-950/10 bg-slate-950 px-4 py-3 text-white' },
                  h(
                    'div',
                    { className: 'mb-2 flex items-center justify-between' },
                    h(
                      'div',
                      null,
                      h('p', { className: 'text-xs font-semibold uppercase text-white/55', style: { letterSpacing: '0.12em' } }, 'Portfolio velocity'),
                      h('p', { className: 'text-xl font-bold' }, 'Rs.312.6 Cr monitored'),
                    ),
                    h(Gauge, { className: 'h-6 w-6', style: { color: stream.accent } }),
                  ),
                  h(
                    'div',
                    { className: 'flex h-16 items-end gap-2' },
                    stream.chart.map((value, index) =>
                      h('span', {
                        key: `${stream.label}-${value}-${index}`,
                        className: 'flex-1 rounded-t-sm',
                        style: {
                          height: `${value}%`,
                          backgroundColor: index === stream.chart.length - 1 ? stream.accent : 'rgba(255,255,255,0.28)',
                        },
                      }),
                    ),
                  ),
                ),
              ),
              h(
                'div',
                { className: 'hide-mobile flex min-h-0 flex-col gap-3' },
                h(TaskRow, { icon: Search, title: 'Document intelligence', text: 'PAN, bank statements, sanction terms', accent: stream.accent }),
                h(TaskRow, { icon: UsersRound, title: 'Maker-checker queue', text: 'Role-based approvals and delegation', accent: stream.accent }),
                h(TaskRow, { icon: FileCheck2, title: 'Audit workpapers', text: 'Evidence packs and exception trails', accent: stream.accent }),
                h(
                  'div',
                  { className: 'mt-auto border border-slate-950/10 px-4 py-4' },
                  h(
                    'div',
                    { className: 'mb-3 flex items-center justify-between' },
                    h('span', { className: 'text-xs font-bold uppercase text-slate-500', style: { letterSpacing: '0.12em' } }, 'Controls'),
                    h(CheckCircle2, { className: 'h-5 w-5 text-emerald-600' }),
                  ),
                  h(
                    'div',
                    { className: 'flex flex-wrap gap-2 text-xs font-semibold' },
                    ['KYC', 'IRACP', 'ECL', 'ALM'].map((item) => h('span', { key: item, className: 'bg-slate-100 px-3 py-2' }, item)),
                  ),
                ),
              ),
            ),
          ),
        );
      }

      function getPanelStyle(role, isMobile) {
        const common = {
          aspectRatio: '1.35 / 1',
          borderRadius: '8px',
        };

        if (role === 'center') {
          return {
            ...common,
            transform: `translateX(-50%) scale(${isMobile ? 1.02 : 1.1})`,
            filter: 'blur(0px)',
            opacity: 1,
            zIndex: 20,
            left: isMobile ? '50%' : '58%',
            width: isMobile ? '92vw' : 'min(52vw, 640px)',
            height: isMobile ? '45%' : '50%',
            bottom: isMobile ? '30%' : '27%',
          };
        }

        if (role === 'left' || role === 'right') {
          return {
            ...common,
            transform: 'translateX(-50%) scale(1)',
            filter: 'blur(2px)',
            opacity: 0.72,
            zIndex: 10,
            left: role === 'left' ? (isMobile ? '18%' : '27%') : isMobile ? '82%' : '73%',
            width: isMobile ? '42vw' : 'min(30vw, 420px)',
            height: isMobile ? '15%' : '27%',
            bottom: isMobile ? '44%' : '12%',
          };
        }

        return {
          ...common,
          transform: 'translateX(-50%) scale(1)',
          filter: 'blur(4px)',
          opacity: 0.5,
          zIndex: 5,
          left: '50%',
          width: isMobile ? '36vw' : 'min(24vw, 340px)',
          height: isMobile ? '13%' : '22%',
          bottom: isMobile ? '45%' : '12%',
        };
      }

      function MetricCard({ label, value, icon }) {
        const Icon = icon;
        return h(
          'div',
          { className: 'border border-slate-950/10 bg-white px-4 py-4' },
          h(
            'div',
            { className: 'mb-5 flex items-center justify-between' },
            h('p', { className: 'text-xs font-semibold uppercase text-slate-500', style: { letterSpacing: '0.12em' } }, label),
            h(Icon, { className: 'h-5 w-5 text-slate-500' }),
          ),
          h('p', { className: 'text-3xl font-bold text-slate-950' }, value),
        );
      }

      function TaskRow({ icon, title, text, accent }) {
        const Icon = icon;
        return h(
          'div',
          { className: 'flex items-start gap-3 border border-slate-950/10 bg-white px-4 py-4' },
          h(
            'span',
            { className: 'mt-1 flex h-8 w-8 shrink-0 items-center justify-center rounded-full', style: { backgroundColor: accent } },
            h(Icon, { className: 'h-4 w-4 text-slate-950' }),
          ),
          h('div', null, h('p', { className: 'text-sm font-bold text-slate-950' }, title), h('p', { className: 'mt-1 text-xs leading-5 text-slate-500' }, text)),
        );
      }

      function NavButton({ label, icon, onClick }) {
        const Icon = icon;
        return h(
          'button',
          {
            type: 'button',
            'aria-label': label,
            onClick,
            className: 'icon-button flex h-12 w-12 items-center justify-center rounded-full border-2 border-white bg-transparent text-white sm:h-16 sm:w-16',
          },
          h(Icon, { size: 26, strokeWidth: 2.25 }),
        );
      }

      function WorkflowBand({ active }) {
        return h(
          'section',
          { id: 'workflow', className: 'bg-slate-950 px-4 py-10 text-white sm:px-8 lg:px-20' },
          h(
            'div',
            { className: 'mx-auto grid max-w-7xl gap-6 lg:grid-cols-[0.85fr_1.15fr]' },
            h(
              'div',
              null,
              h('p', { className: 'mb-3 text-xs font-bold uppercase text-white/50', style: { letterSpacing: '0.18em' } }, 'Enterprise workflow'),
              h('h2', { className: 'max-w-xl text-3xl font-bold leading-tight sm:text-5xl' }, 'One operating layer for origination, servicing, risk, and audit.'),
            ),
            h(
              'div',
              { className: 'grid gap-3 sm:grid-cols-3' },
              h(CompactFeature, { icon: CircleDollarSign, title: 'Credit engine', text: 'Rules, scorecards, delegation, and pricing.', color: active.accent }),
              h(CompactFeature, { icon: Layers3, title: 'Loan book', text: 'Schedules, receipts, ledgers, and reconciliations.', color: active.accent }),
              h(CompactFeature, { icon: Sparkles, title: 'Analytics', text: 'Risk alerts, ECL signals, and workpaper packs.', color: active.accent }),
            ),
          ),
        );
      }

      function CompactFeature({ icon, title, text, color }) {
        const Icon = icon;
        return h(
          'div',
          { className: 'border border-white/10 bg-white/5 p-5' },
          h(Icon, { className: 'mb-8 h-6 w-6', style: { color } }),
          h('h3', { className: 'text-lg font-bold' }, title),
          h('p', { className: 'mt-2 text-sm leading-6 text-white/60' }, text),
        );
      }

      function OperationsConsole({
        applications,
        borrower,
        setBorrower,
        product,
        setProduct,
        loanAmount,
        setLoanAmount,
        rate,
        setRate,
        months,
        setMonths,
        emi,
        addApplication,
        selectedAnalytics,
        toggleAnalytics,
        generateWorkpaper,
        active,
      }) {
        const analytics = ['Eligibility', 'EMI', 'IRACP', 'ECL', 'Collections', 'Audit Trail'];
        const totalBook = applications.reduce((sum, item) => sum + item.amount, 0);

        return h(
          'section',
          { className: 'bg-white px-4 py-10 text-slate-950 sm:px-8 lg:px-20' },
          h(
            'div',
            { className: 'mx-auto max-w-7xl' },
            h(
              'div',
              { className: 'mb-8 flex flex-col justify-between gap-4 lg:flex-row lg:items-end' },
              h(
                'div',
                null,
                h('p', { className: 'mb-3 text-xs font-bold uppercase text-slate-500', style: { letterSpacing: '0.18em' } }, 'Functional loan management'),
                h('h2', { className: 'max-w-3xl text-3xl font-bold leading-tight sm:text-5xl' }, 'Operate the full loan cycle from one browser page.'),
              ),
              h(
                'div',
                { className: 'grid grid-cols-3 gap-2 text-center' },
                h(StatPill, { label: 'Applications', value: applications.length }),
                h(StatPill, { label: 'Book', value: `Rs.${(totalBook / 100000).toFixed(1)}L` }),
                h(StatPill, { label: 'EMI', value: `Rs.${Math.round(emi).toLocaleString('en-IN')}` }),
              ),
            ),
            h(
              'div',
              { className: 'grid gap-4 lg:grid-cols-[0.95fr_1.05fr]' },
              h(
                'div',
                { className: 'border border-slate-200 p-5' },
                h(SectionTitle, { icon: UserPlus, title: 'Borrower and loan intake', text: 'Create a new application and compute repayment terms.' }),
                h(
                  'div',
                  { className: 'mt-5 grid gap-3 sm:grid-cols-2' },
                  h(Field, { label: 'Borrower', value: borrower, onChange: setBorrower }),
                  h(Field, { label: 'Product', value: product, onChange: setProduct }),
                  h(NumberField, { label: 'Amount', value: loanAmount, onChange: setLoanAmount }),
                  h(NumberField, { label: 'Rate %', value: rate, onChange: setRate, step: '0.1' }),
                  h(NumberField, { label: 'Tenure months', value: months, onChange: setMonths }),
                  h(
                    'div',
                    { className: 'border border-slate-200 bg-slate-50 px-4 py-3' },
                    h('p', { className: 'text-xs font-bold uppercase text-slate-500' }, 'Estimated EMI'),
                    h('p', { className: 'mt-2 text-2xl font-bold' }, `Rs.${Math.round(emi).toLocaleString('en-IN')}`),
                  ),
                ),
                h(
                  'button',
                  { onClick: addApplication, className: 'mt-4 flex w-full items-center justify-center gap-2 bg-slate-950 px-4 py-3 text-sm font-bold text-white transition hover:bg-slate-800' },
                  h(UserPlus, { className: 'h-4 w-4' }),
                  'Add application',
                ),
              ),
              h(
                'div',
                { className: 'border border-slate-200 p-5' },
                h(SectionTitle, { icon: Layers3, title: 'Live loan pipeline', text: 'Track borrower, product, exposure, score, and status.' }),
                h(
                  'div',
                  { className: 'mt-5 overflow-x-auto' },
                  h(
                    'table',
                    { className: 'w-full min-w-[620px] border-collapse text-left text-sm' },
                    h(
                      'thead',
                      { className: 'bg-slate-950 text-white' },
                      h('tr', null, ['Borrower', 'Product', 'Amount', 'Score', 'Status'].map((head) => h('th', { key: head, className: 'px-4 py-3 font-semibold' }, head))),
                    ),
                    h(
                      'tbody',
                      null,
                      applications.map((item) =>
                        h(
                          'tr',
                          { key: `${item.borrower}-${item.amount}`, className: 'border-b border-slate-200' },
                          h('td', { className: 'px-4 py-3 font-bold' }, item.borrower),
                          h('td', { className: 'px-4 py-3 text-slate-600' }, item.product),
                          h('td', { className: 'px-4 py-3' }, `Rs.${item.amount.toLocaleString('en-IN')}`),
                          h('td', { className: 'px-4 py-3' }, item.score),
                          h('td', { className: 'px-4 py-3' }, h('span', { className: 'bg-slate-100 px-3 py-1 text-xs font-bold' }, item.status)),
                        ),
                      ),
                    ),
                  ),
                ),
              ),
            ),
            h(
              'div',
              { className: 'mt-4 grid gap-4 lg:grid-cols-4' },
              h(WorkflowCard, { icon: Building2, title: 'Organization setup', text: 'Tenant, branch, product, and approval hierarchy readiness.', items: ['Tenant active', 'Branch mapped', 'Roles assigned'], color: active.accent }),
              h(WorkflowCard, { icon: UploadCloud, title: 'Upload and mapping', text: 'Import loan books, bank files, KYC data, and map required columns.', items: ['CSV/XLSX source', 'Column mapping', 'Validation rules'], color: active.accent }),
              h(
                'div',
                { className: 'border border-slate-200 p-5' },
                h(SectionTitle, { icon: Settings2, title: 'Analytics selection', text: 'Choose tests before execution.' }),
                h(
                  'div',
                  { className: 'mt-4 flex flex-wrap gap-2' },
                  analytics.map((name) =>
                    h(
                      'button',
                      {
                        key: name,
                        onClick: () => toggleAnalytics(name),
                        className: `px-3 py-2 text-xs font-bold ${selectedAnalytics.includes(name) ? 'bg-slate-950 text-white' : 'bg-slate-100 text-slate-700'}`,
                      },
                      name,
                    ),
                  ),
                ),
                h(
                  'button',
                  { className: 'mt-4 flex w-full items-center justify-center gap-2 border border-slate-950 px-4 py-3 text-sm font-bold', onClick: generateWorkpaper },
                  h(PlayCircle, { className: 'h-4 w-4' }),
                  'Execute and download workpaper',
                ),
              ),
              h(WorkflowCard, { icon: UserCog, title: 'User management', text: 'Maker-checker access, reviewer roles, and audit trail ownership.', items: ['Admin', 'Credit maker', 'Audit reviewer'], color: active.accent }),
            ),
            h(
              'div',
              { className: 'mt-4 border border-slate-200 bg-slate-50 p-5' },
              h(SectionTitle, { icon: FileText, title: 'What is now covered', text: 'The app now includes the requested loan-management workflow in an interactive no-install static deployment.' }),
              h(
                'div',
                { className: 'mt-4 grid gap-2 text-sm text-slate-700 sm:grid-cols-2 lg:grid-cols-5' },
                ['Sign-in shell', 'Organization setup', 'Company/product setup', 'Data upload and mapping', 'Configuration', 'Analytics selection', 'Execution', 'Workpaper generation', 'User management', 'GitHub Pages hosting'].map((item) =>
                  h('div', { key: item, className: 'border border-slate-200 bg-white px-3 py-2 font-semibold' }, item),
                ),
              ),
            ),
          ),
        );
      }

      function StatPill({ label, value }) {
        return h(
          'div',
          { className: 'border border-slate-200 px-4 py-3' },
          h('p', { className: 'text-xs font-bold uppercase text-slate-500' }, label),
          h('p', { className: 'mt-1 text-xl font-bold' }, value),
        );
      }

      function SectionTitle({ icon, title, text }) {
        const Icon = icon;
        return h(
          'div',
          { className: 'flex items-start gap-3' },
          h('span', { className: 'flex h-10 w-10 shrink-0 items-center justify-center bg-slate-950 text-white' }, h(Icon, { className: 'h-5 w-5' })),
          h('div', null, h('h3', { className: 'text-lg font-bold' }, title), h('p', { className: 'mt-1 text-sm leading-6 text-slate-500' }, text)),
        );
      }

      function Field({ label, value, onChange }) {
        return h(
          'label',
          { className: 'block' },
          h('span', { className: 'text-xs font-bold uppercase text-slate-500' }, label),
          h('input', {
            value,
            onChange: (event) => onChange(event.target.value),
            className: 'mt-2 w-full border border-slate-200 px-3 py-3 text-sm outline-none focus:border-slate-950',
          }),
        );
      }

      function NumberField({ label, value, onChange, step = '1' }) {
        return h(
          'label',
          { className: 'block' },
          h('span', { className: 'text-xs font-bold uppercase text-slate-500' }, label),
          h('input', {
            type: 'number',
            value,
            step,
            onChange: (event) => onChange(Number(event.target.value)),
            className: 'mt-2 w-full border border-slate-200 px-3 py-3 text-sm outline-none focus:border-slate-950',
          }),
        );
      }

      function WorkflowCard({ icon, title, text, items, color }) {
        const Icon = icon;
        return h(
          'div',
          { className: 'border border-slate-200 p-5' },
          h('span', { className: 'mb-6 flex h-10 w-10 items-center justify-center rounded-full', style: { backgroundColor: color } }, h(Icon, { className: 'h-5 w-5' })),
          h('h3', { className: 'text-lg font-bold' }, title),
          h('p', { className: 'mt-2 text-sm leading-6 text-slate-500' }, text),
          h('div', { className: 'mt-4 space-y-2' }, items.map((item) => h('p', { key: item, className: 'flex items-center gap-2 text-sm font-semibold' }, h(CheckCircle2, { className: 'h-4 w-4 text-emerald-600' }), item))),
        );
      }

      createRoot(document.getElementById('root')).render(h(App));
    </script>
  </body>
</html>
